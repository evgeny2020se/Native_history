    <script>
		var images = document.querySelectorAll(".image");
		var bigimgcontainer = document.querySelector(".img-big");
		var bigimg = document.querySelector("#image");
		images.forEach(img => {
		    img.addEventListener('click', e => {
            bigimgcontainer.classList.add('open');
            console.log(img.getAttribute('src'))
		        bigimg.src = img.getAttribute('src');
		    })
		})
    bigimgcontainer.addEventListener('click', e => bigimgcontainer.classList.remove('open'))
	</script>
